<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a;
        }
        .bubble {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bubble:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 space-y-8">

    <!-- Overwrite's Bubble (You) -->
    <div id="user-card" class="bubble w-full max-w-sm bg-indigo-600/20 border border-indigo-500/30 rounded-[3rem] p-10 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl"></div>
        
        <div class="relative z-10 flex flex-col items-center text-center">
            <div class="flex items-center space-x-2 mb-2">
                <span id="user-icon"></span>
                <h2 class="text-xl font-bold tracking-tight text-indigo-300">Overwrite</h2>
                <div id="user-you-tag" class="hidden bg-indigo-500 text-[10px] font-black px-2 py-0.5 rounded-full text-white uppercase">YOU</div>
            </div>
            
            <div id="user-time" class="text-6xl font-black tabular-nums tracking-tighter mb-2">--:--</div>
            <div id="user-date" class="text-sm font-medium text-slate-400 uppercase tracking-widest">Loading...</div>
        </div>
    </div>

    <!-- Blue's Bubble (Him) -->
    <div id="blue-card" class="bubble w-full max-w-sm bg-blue-600/20 border border-blue-500/30 rounded-[3rem] p-10 shadow-2xl relative overflow-hidden">
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl"></div>
        
        <div class="relative z-10 flex flex-col items-center text-center">
            <div class="flex items-center space-x-2 mb-2">
                <span id="blue-icon"></span>
                <h2 class="text-xl font-bold tracking-tight text-blue-300">Blue</h2>
                <div id="blue-you-tag" class="hidden bg-blue-500 text-[10px] font-black px-2 py-0.5 rounded-full text-white uppercase">YOU</div>
            </div>
            
            <div id="blue-time" class="text-6xl font-black tabular-nums tracking-tighter mb-2">--:--</div>
            <div id="blue-date" class="text-sm font-medium text-slate-400 uppercase tracking-widest">Loading...</div>
        </div>
    </div>

    <script>
        // These are the timezones locked to Overwrite and Blue
        const OVERWRITE_TZ = 'Europe/Kyiv'; 
        const BLUE_TZ = 'America/Los_Angeles';

        const moonSvg = `<svg class="text-indigo-300" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
        const sunSvg = `<svg class="text-amber-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;

        function updateClocks() {
            const now = new Date();

            const configs = [
                { idPrefix: 'user', tz: OVERWRITE_TZ },
                { idPrefix: 'blue', tz: BLUE_TZ }
            ];

            configs.forEach(cfg => {
                const timeStr = now.toLocaleTimeString('en-US', { timeZone: cfg.tz, hour: 'numeric', minute: '2-digit', hour12: true });
                const dateStr = now.toLocaleDateString('en-US', { timeZone: cfg.tz, month: 'short', day: 'numeric' });
                const hour24 = parseInt(now.toLocaleTimeString('en-US', { timeZone: cfg.tz, hour: 'numeric', hour12: false }));

                document.getElementById(`${cfg.idPrefix}-time`).textContent = timeStr.replace(' AM', '').replace(' PM', '');
                document.getElementById(`${cfg.idPrefix}-date`).textContent = dateStr + (timeStr.includes('PM') ? ' • PM' : ' • AM');
                document.getElementById(`${cfg.idPrefix}-icon`).innerHTML = (hour24 < 6 || hour24 > 18) ? moonSvg : sunSvg;
            });
        }

        function detectLocation() {
            try {
                const visitorTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                // Highlight Overwrite's bubble if you are visiting
                if (visitorTz === OVERWRITE_TZ) {
                    document.getElementById('user-card').classList.add('ring-2', 'ring-indigo-500', 'bg-indigo-600/30');
                    document.getElementById('user-you-tag').classList.remove('hidden');
                } 
                // Highlight Blue's bubble if he is visiting
                else if (visitorTz === BLUE_TZ) {
                    document.getElementById('blue-card').classList.add('ring-2', 'ring-blue-500', 'bg-blue-600/30');
                    document.getElementById('blue-you-tag').classList.remove('hidden');
                }
            } catch (e) {}
        }

        setInterval(updateClocks, 1000);
        updateClocks();
        detectLocation();
    </script>
</body>
</html>
